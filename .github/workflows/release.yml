name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/release | Out-Null
          $version = "${{ github.ref_name }}".TrimStart("v")
          Copy-Item target/release/codex-history-migrator.exe "artifacts/release/codex-history-migrator-v$version-windows-x86_64.exe" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: artifacts/release/codex-history-migrator-v*-windows-x86_64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build both macOS targets
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary
        run: |
          mkdir -p artifacts/release
          lipo -create \
            target/x86_64-apple-darwin/release/codex-history-migrator \
            target/aarch64-apple-darwin/release/codex-history-migrator \
            -output artifacts/release/codex-history-migrator-universal2

      - name: Package macOS artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/package-macos.sh
          ./scripts/package-macos.sh "${VERSION#v}" "artifacts/release/codex-history-migrator-universal2"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            artifacts/release/codex-history-migrator-v*-macos-universal2.zip
            artifacts/release/codex-history-migrator-v*-macos-universal2.dmg

  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            libxi-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            patchelf \
            desktop-file-utils

      - name: Build release binary
        run: cargo build --release

      - name: Download appimagetool
        run: |
          wget -q -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          cat > appimagetool-wrapper.sh <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          "$(dirname "$0")/appimagetool.AppImage" --appimage-extract-and-run "$@"
          EOF
          chmod +x appimagetool-wrapper.sh

      - name: Package Linux artifacts
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          chmod +x scripts/package-linux.sh
          APPIMAGETOOL="$PWD/appimagetool-wrapper.sh" \
            ./scripts/package-linux.sh "${VERSION#v}" "target/release/codex-history-migrator"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            artifacts/release/codex-history-migrator-v*-linux-x86_64.tar.gz
            artifacts/release/codex-history-migrator-v*-linux-x86_64.AppImage

  publish:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
